<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - TheWolf-CyberTech</title>

<style>
body{
    font-family:Arial;
    margin:0;
    background:#f4f4f4;
}

header{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    max-width:600px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

input, textarea{
    width:100%;
    padding:10px;
    margin-top:10px;
}

button{
    margin-top:15px;
    padding:10px 20px;
    background:#0d6efd;
    color:white;
    border:none;
}
</style>

</head>
<body>

<header>
    <h1>Contact TheWolf-CyberTech</h1>
</header>

<div class="container">
    <h2>Send us a message</h2>

    <input type="text" placeholder="Your Name">

    <input type="email" placeholder="Your Email">

    <textarea rows="5" placeholder="Your Message"></textarea>

    <button>Send</button>
</div>

</body>
</html>
